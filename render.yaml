services:
  - type: web
    name: api-pdf-docling-v61
    env: python
    region: oregon
    plan: starter
    rootDir: api_docling
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_PDF_ENV
        value: production
      - key: DOCLING_OCR_ENABLED
        value: "false"
      - key: DOCLING_TIMEOUT_SECONDS
        value: "120"
      - key: API_PDF_REQUIRE_KEY
        value: "true"
      - key: API_PDF_API_KEY_HEADER
        value: x-api-key
