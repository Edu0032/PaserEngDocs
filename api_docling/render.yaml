services:
  - type: web
    name: api-pdf-docling-v61
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements-server.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 180 --graceful-timeout 180 --log-level info
    envVars:
      - key: API_PDF_ENV
        value: production
      - key: API_PDF_DOCS_ENABLED
        value: "true"
      - key: API_PDF_CORS_ALLOW_ORIGINS
        value: "*"
      - key: DOCLING_OCR_ENABLED
        value: "false"
      - key: DOCLING_TIMEOUT_SECONDS
        value: "240"
      - key: API_PDF_REQUIRE_KEY
        value: "true"
      - key: API_PDF_API_KEY_HEADER
        value: x-api-key
      - key: API_PDF_API_KEY
        sync: false
